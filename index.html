<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>蜗牛AI · CRM系统优化学习互动</title>
<style>
:root {
  --bg-cream: #FFF8F2;
  --bg-warm: #FFF5EB;
  --card-white: #FFFFFF;
  --text-primary: #2D2B32;
  --text-secondary: #6B6678;
  --text-muted: #9E99AA;
  --accent-pink: #FF8FAB;
  --accent-mint: #6EE7B7;
  --accent-sky: #7DD3FC;
  --accent-lavender: #C4B5FD;
  --accent-peach: #FCA5A5;
  --accent-yellow: #FDE68A;
  --accent-coral: #FDA4AF;
  --green: #34D399;
  --red: #FB7185;
  --radius: 24px;
  --radius-sm: 16px;
  --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: var(--font);
  background: var(--bg-cream);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Floating snails */
.snail-float {
  position: fixed;
  z-index: 50;
  opacity: 0.5;
  pointer-events: none;
  animation: snailFloat 5s ease-in-out infinite;
  font-size: 28px;
}
.snail-fl-1 { top: 60px; left: 12px; animation-delay: 0s; }
.snail-fl-2 { top: 180px; right: 15px; animation-delay: 1s; }
.snail-fl-3 { top: 340px; left: 8px; animation-delay: 2s; }
.snail-fl-4 { top: 500px; right: 10px; animation-delay: 0.5s; }
.snail-fl-5 { top: 650px; left: 14px; animation-delay: 1.5s; }
.snail-fl-6 { top: 800px; right: 12px; animation-delay: 2.5s; }
.snail-fl-7 { top: 950px; left: 10px; animation-delay: 3s; }
.snail-fl-8 { top: 1100px; right: 16px; animation-delay: 0.8s; }
@keyframes snailFloat {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  25% { transform: translateY(-10px) rotate(3deg); }
  75% { transform: translateY(6px) rotate(-2deg); }
}

/* Quiz Container */
.quiz-container {
  max-width: 680px;
  margin: 0 auto;
  padding: 20px;
  position: relative;
  z-index: 10;
}

/* Logo bar */
.quiz-logo-bar {
  text-align: center;
  padding: 8px 0 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.quiz-logo-bar img {
  height: 32px;
  opacity: 0.45;
  transition: opacity 0.3s;
}
.quiz-logo-bar img:hover { opacity: 0.7; }
.quiz-logo-bar span {
  font-size: 10px;
  letter-spacing: 1px;
  color: var(--text-muted);
  font-weight: 600;
}

/* Start Page */
.start-page {
  text-align: center;
  padding: 40px 20px;
  animation: fadeInUp 0.6s ease;
}
.start-page .logo-hero {
  width: 140px;
  animation: bounce 2s ease-in-out infinite;
  filter: drop-shadow(0 4px 12px rgba(255,200,0,0.3));
  margin-bottom: 20px;
}
.start-page h1 {
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 8px;
  background: linear-gradient(135deg, #FF8FAB, #C4B5FD);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.start-page .subtitle {
  font-size: 15px;
  color: var(--text-secondary);
  margin-bottom: 24px;
}
.start-page .desc {
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 30px;
  line-height: 1.8;
}
.btn-start {
  display: inline-block;
  padding: 14px 48px;
  background: linear-gradient(135deg, #FF8FAB, #C4B5FD);
  color: white;
  border: none;
  border-radius: 50px;
  font-size: 17px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
  box-shadow: 0 4px 20px rgba(255,143,171,0.3);
}
.btn-start:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 28px rgba(255,143,171,0.4);
}

/* Progress Overview */
.progress-overview {
  background: var(--card-white);
  border-radius: var(--radius-sm);
  padding: 16px 20px;
  margin: 20px 0 0;
  box-shadow: 0 2px 12px rgba(0,0,0,0.04);
  text-align: left;
}
.progress-overview h3 {
  font-size: 14px;
  color: var(--text-secondary);
  margin-bottom: 10px;
}
.progress-stats {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
}
.progress-stat {
  font-size: 12px;
  color: var(--text-muted);
  background: var(--bg-warm);
  padding: 6px 12px;
  border-radius: 20px;
}
.progress-stat strong { color: var(--text-primary); }

/* Quiz Card */
.quiz-page { display: none; }
.quiz-page.active { display: block; animation: fadeInUp 0.5s ease; }

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

.quiz-card {
  background: var(--card-white);
  border-radius: var(--radius);
  padding: 28px 24px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.06);
  position: relative;
  overflow: hidden;
  transition: all 0.3s;
}
.quiz-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  opacity: 0.15;
  z-index: 0;
  pointer-events: none;
}
/* 15 backgrounds */
.snail-bg-1::before  { background: linear-gradient(135deg, #FFF0F5, #FFE4EC); }
.snail-bg-2::before  { background: linear-gradient(135deg, #F0FFF4, #E6FFE6); }
.snail-bg-3::before  { background: linear-gradient(135deg, #F0F8FF, #E6F2FF); }
.snail-bg-4::before  { background: linear-gradient(135deg, #F8F0FF, #F0E6FF); }
.snail-bg-5::before  { background: linear-gradient(135deg, #FFF5F0, #FFEEE6); }
.snail-bg-6::before  { background: linear-gradient(135deg, #FFFCF0, #FFF8E6); }
.snail-bg-7::before  { background: linear-gradient(135deg, #FFF0F0, #FFE8E8); }
.snail-bg-8::before  { background: linear-gradient(135deg, #F0FFF5, #E6FFEE); }
.snail-bg-9::before  { background: linear-gradient(135deg, #F8F0FF, #F3E8FF); }
.snail-bg-10::before { background: linear-gradient(135deg, #FFF0F5, #FFE8F0); }
.snail-bg-11::before { background: linear-gradient(135deg, #F0FFFF, #E6FAFA); }
.snail-bg-12::before { background: linear-gradient(135deg, #FFFDF5, #FFF8EE); }
.snail-bg-13::before { background: linear-gradient(135deg, #FFF0F3, #FFEAEF); }
.snail-bg-14::before { background: linear-gradient(135deg, #FFFCF0, #FFF5E6); }
.snail-bg-15::before { background: linear-gradient(135deg, #F8F0FF, #F5EAFF); }

.card-corner-snail {
  position: absolute;
  width: 45px; height: 45px;
  pointer-events: none;
  opacity: 0.35;
  z-index: 0;
  font-size: 24px;
}
.ccs-tl { top: 8px; left: 8px; }
.ccs-tr { top: 8px; right: 8px; }
.ccs-bl { bottom: 8px; left: 8px; }
.ccs-br { bottom: 8px; right: 8px; }

.module-badge {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  margin-bottom: 12px;
  position: relative;
  z-index: 1;
}
.mastery-badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 16px;
  font-size: 10px;
  font-weight: 600;
  margin-left: 6px;
}
.mastery-mastered { background: #D1FAE5; color: #065F46; }
.mastery-familiar { background: #FEF3C7; color: #92400E; }
.mastery-weak { background: #FEE2E2; color: #991B1B; }
.mastery-new { background: #E0E7FF; color: #3730A3; }

.contact-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 500;
  margin-bottom: 10px;
  position: relative;
  z-index: 1;
}
.contact-avatar {
  width: 20px; height: 20px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 10px;
  font-weight: 700;
}

.question-text {
  font-size: 17px;
  font-weight: 600;
  line-height: 1.6;
  margin-bottom: 20px;
  position: relative;
  z-index: 1;
}

.options-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
  position: relative;
  z-index: 1;
}
.option-btn {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 18px;
  background: var(--bg-warm);
  border: 2px solid transparent;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.25s;
  font-size: 14px;
  text-align: left;
}
.option-btn:hover {
  background: #FFF0F5;
  border-color: var(--accent-pink);
  transform: translateX(4px);
}
.option-btn.selected {
  background: #FFF0F5;
  border-color: var(--accent-pink);
}
.option-btn.correct {
  background: #D1FAE5;
  border-color: var(--green);
}
.option-btn.wrong {
  background: #FEE2E2;
  border-color: var(--red);
}
.option-letter {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 13px;
  flex-shrink: 0;
  border: 2px solid #E5E7EB;
}
.option-btn.correct .option-letter { background: var(--green); color: white; border-color: var(--green); }
.option-btn.wrong .option-letter { background: var(--red); color: white; border-color: var(--red); }

.explanation-box {
  display: none;
  margin-top: 16px;
  padding: 16px;
  background: #F0F9FF;
  border-radius: var(--radius-sm);
  border-left: 4px solid var(--accent-sky);
  position: relative;
  z-index: 1;
  font-size: 13px;
  line-height: 1.7;
  color: var(--text-secondary);
}
.explanation-box.visible { display: block; animation: fadeInUp 0.3s ease; }
.explanation-box .knowledge-tag {
  display: inline-block;
  padding: 2px 8px;
  background: #DBEAFE;
  color: #1E40AF;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 600;
  margin-top: 8px;
}

/* Progress bar */
.progress-bar-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 20px 0 16px;
}
.progress-track {
  flex: 1;
  height: 8px;
  background: #F3F0F6;
  border-radius: 4px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #FF8FAB, #C4B5FD);
  border-radius: 4px;
  transition: width 0.5s ease;
}
.progress-text {
  font-size: 13px;
  color: var(--text-muted);
  font-weight: 600;
  white-space: nowrap;
}
.progress-logo {
  height: 14px;
  opacity: 0.6;
}

.btn-next {
  display: none;
  margin-top: 20px;
  padding: 12px 36px;
  background: linear-gradient(135deg, #FF8FAB, #C4B5FD);
  color: white;
  border: none;
  border-radius: 50px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
  position: relative;
  z-index: 1;
}
.btn-next:hover { transform: translateY(-2px); }
.btn-next.visible { display: inline-block; animation: fadeInUp 0.3s ease; }

/* Result Page */
.result-page {
  display: none;
  text-align: center;
  padding: 30px 20px;
  animation: fadeInUp 0.6s ease;
}
.result-page.active { display: block; }
.result-page .logo-result {
  width: 100px;
  animation: bounce 2s ease-in-out infinite;
  filter: drop-shadow(0 4px 12px rgba(255,200,0,0.3));
  margin-bottom: 16px;
}
.result-page h2 {
  font-size: 26px;
  font-weight: 700;
  margin-bottom: 6px;
}
.result-score {
  font-size: 56px;
  font-weight: 800;
  background: linear-gradient(135deg, #FF8FAB, #C4B5FD);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin: 12px 0;
}
.result-msg {
  font-size: 15px;
  color: var(--text-secondary);
  margin-bottom: 20px;
}

/* Memory Panel */
.memory-panel {
  background: var(--card-white);
  border-radius: var(--radius-sm);
  padding: 20px;
  margin: 20px 0;
  box-shadow: 0 2px 12px rgba(0,0,0,0.04);
  text-align: left;
}
.memory-panel h3 {
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 14px;
  color: var(--text-primary);
}
.trend-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
  font-size: 13px;
}
.trend-label { color: var(--text-secondary); }
.trend-value { font-weight: 700; }
.trend-up { color: var(--green); }
.trend-down { color: var(--red); }
.trend-flat { color: var(--text-muted); }

/* Option preference bars */
.pref-bar-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
  font-size: 12px;
}
.pref-label { width: 16px; font-weight: 700; color: var(--text-secondary); }
.pref-track {
  flex: 1;
  height: 10px;
  background: #F3F0F6;
  border-radius: 5px;
  overflow: hidden;
}
.pref-fill {
  height: 100%;
  border-radius: 5px;
  transition: width 0.5s;
}
.pref-pct { width: 36px; text-align: right; color: var(--text-muted); font-size: 11px; }

/* Module mastery */
.module-mastery-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
  font-size: 12px;
}
.mm-icon { font-size: 16px; }
.mm-name { flex: 1; color: var(--text-secondary); }
.mm-bar {
  width: 80px;
  height: 8px;
  background: #F3F0F6;
  border-radius: 4px;
  overflow: hidden;
}
.mm-fill { height: 100%; border-radius: 4px; transition: width 0.5s; }
.mm-pct { width: 30px; text-align: right; font-weight: 600; font-size: 11px; }

.btn-retry {
  display: inline-block;
  padding: 12px 36px;
  background: linear-gradient(135deg, #FF8FAB, #C4B5FD);
  color: white;
  border: none;
  border-radius: 50px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
  margin-top: 10px;
}
.btn-retry:hover { transform: translateY(-2px); }

/* Responsive */
@media (max-width: 480px) {
  .quiz-container { padding: 12px; }
  .quiz-card { padding: 20px 16px; }
  .question-text { font-size: 15px; }
  .option-btn { padding: 12px 14px; font-size: 13px; }
  .snail-float { display: none; }
  .quiz-logo-bar img { height: 24px; }
}
</style>
</head>

// ========== STATE ==========
let currentQ = 0;
let score = 0;
let answers = [];
let shuffledOptions = [];
let answered = false;
const totalQ = 15;

// ========== RANDOMIZE ==========
function randomizeAnswers() {
  shuffledOptions = [];
  modules.forEach(m => {
    m.questions.forEach(q => {
      const correctIdx = q.originalAnswer;
      const correctOpt = q.options[correctIdx];
      const wrongOpts = q.options.filter((_, i) => i !== correctIdx);
      // Fisher-Yates shuffle wrong options
      for (let i = wrongOpts.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [wrongOpts[i], wrongOpts[j]] = [wrongOpts[j], wrongOpts[i]];
      }
      const correctSlot = Math.floor(Math.random() * 4);
      const opts = [];
      let wIdx = 0;
      for (let i = 0; i < 4; i++) {
        if (i === correctSlot) {
          opts.push({ text: correctOpt, isCorrect: true });
        } else {
          opts.push({ text: wrongOpts[wIdx++], isCorrect: false });
        }
      }
      shuffledOptions.push({ questionId: q.id, options: opts, correctSlot });
    });
  });
}

// ========== LOCALSTORAGE ==========
function getProgress() {
  try {
    const d = localStorage.getItem('snail_quiz_progress');
    return d ? JSON.parse(d) : null;
  } catch(e) { return null; }
}
function saveProgress(result) {
  let p = getProgress() || { totalAttempts:0, bestScore:0, lastScore:0, lastDate:'', history:[], questionStats:{}, moduleStats:{}, optionPreference:{A:0,B:0,C:0,D:0} };
  p.totalAttempts++;
  if (result.score > p.bestScore) p.bestScore = result.score;
  p.lastScore = result.score;
  p.lastDate = new Date().toISOString().slice(0,10);
  p.history.push({ date: p.lastDate, score: result.score, total: totalQ, moduleScores: result.moduleScores });
  if (p.history.length > 20) p.history = p.history.slice(-20);
  // question stats
  result.details.forEach(d => {
    if (!p.questionStats[d.qId]) p.questionStats[d.qId] = { correct:0, wrong:0 };
    d.correct ? p.questionStats[d.qId].correct++ : p.questionStats[d.qId].wrong++;
  });
  // module stats
  Object.entries(result.moduleScores).forEach(([mId, ms]) => {
    if (!p.moduleStats[mId]) p.moduleStats[mId] = { totalCorrect:0, totalWrong:0 };
    p.moduleStats[mId].totalCorrect += ms.correct;
    p.moduleStats[mId].totalWrong += ms.wrong;
  });
  // option preference
  result.optionPreference && Object.entries(result.optionPreference).forEach(([k,v]) => {
    p.optionPreference[k] = (p.optionPreference[k]||0) + v;
  });
  try { localStorage.setItem('snail_quiz_progress', JSON.stringify(p)); } catch(e) {}
}

function getMasteryLevel(qId) {
  const p = getProgress();
  if (!p || !p.questionStats[qId]) return 'new';
  const s = p.questionStats[qId];
  const total = s.correct + s.wrong;
  if (total === 0) return 'new';
  const rate = s.correct / total;
  if (rate >= 0.8) return 'mastered';
  if (rate >= 0.5) return 'familiar';
  return 'weak';
}

function getMasteryLabel(level) {
  const map = { mastered:'已掌握', familiar:'熟悉中', weak:'薄弱', new:'首次' };
  return map[level] || '首次';
}
function getMasteryClass(level) {
  const map = { mastered:'mastery-mastered', familiar:'mastery-familiar', weak:'mastery-weak', new:'mastery-new' };
  return map[level] || 'mastery-new';
}

// ========== RENDER ==========
function renderStartPage() {
  document.getElementById('startPage').style.display = '';
  document.getElementById('quizPage').classList.remove('active');
  document.getElementById('resultPage').classList.remove('active');
  const p = getProgress();
  if (p && p.totalAttempts > 0) {
    document.getElementById('progressOverview').style.display = '';
    const avg = p.history.length > 0 ? (p.history.reduce((s,h) => s+h.score, 0) / p.history.length).toFixed(1) : 0;
    // Find weak modules
    let weakModules = [];
    Object.entries(p.moduleStats).forEach(([mId, ms]) => {
      const rate = ms.totalCorrect / (ms.totalCorrect + ms.totalWrong || 1);
      if (rate < 0.5) weakModules.push(mId);
    });
    let weakHtml = weakModules.map(mId => {
      const m = modules.find(x => x.id == mId);
      return m ? `<span style="background:#FEE2E2;color:#991B1B;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;margin-left:4px">${m.icon} ${m.title} 薄弱</span>` : '';
    }).join('');
    document.getElementById('progressStats').innerHTML =
      `<div class="progress-stat">答题 <strong>${p.totalAttempts}</strong> 次</div>` +
      `<div class="progress-stat">最佳 <strong>${p.bestScore}/${totalQ}</strong></div>` +
      `<div class="progress-stat">平均 <strong>${avg}</strong></div>` +
      `<div class="progress-stat">上次 <strong>${p.lastScore}/${totalQ}</strong></div>` +
      (weakHtml ? `</div><div style="margin-top:8px;font-size:11px;color:var(--text-muted)">薄弱模块：${weakHtml}</div>` : '');
  }
}

function getQuestionData(idx) {
  let qIdx = 0;
  for (const m of modules) {
    for (const q of m.questions) {
      if (qIdx === idx) return { module: m, question: q, shuffled: shuffledOptions[idx] };
      qIdx++;
    }
  }
  return null;
}

function renderQuestion(idx) {
  const data = getQuestionData(idx);
  if (!data) return;
  const { module, question, shuffled } = data;
  const bgClass = `snail-bg-${(idx % 15) + 1}`;
  const card = document.getElementById('quizCard');
  card.className = `quiz-card ${bgClass}`;
  const mastery = getMasteryLevel(question.id);
  const letters = ['A','B','C','D'];
  const optsHtml = shuffled.options.map((o, i) =>
    `<button class="option-btn" data-idx="${i}" onclick="selectOption(${i})">
      <span class="option-letter">${letters[i]}</span>
      <span>${o.text}</span>
    </button>`
  ).join('');

  document.getElementById('cardContent').innerHTML =
    `<span class="module-badge" style="background:${module.color}22;color:${module.color}">${module.icon} ${module.title}</span>` +
    `<span class="mastery-badge ${getMasteryClass(mastery)}">${getMasteryLabel(mastery)}</span>` +
    `<div class="contact-tag" style="background:${question.contact.color}15;color:${question.contact.color}">
      <span class="contact-avatar" style="background:${question.contact.color}">${question.contact.initial}</span>
      ${question.contact.name} · ${question.contact.role}
    </div>` +
    `<div class="question-text">${question.text}</div>` +
    `<div class="options-list">${optsHtml}</div>` +
    `<div class="explanation-box" id="explanation">
      <strong>📝 解析：</strong>${question.explanation}
      <div class="knowledge-tag">${question.knowledge}</div>
    </div>`;

  document.getElementById('progressFill').style.width = `${((idx+1)/totalQ)*100}%`;
  document.getElementById('progressText').textContent = `${idx+1}/${totalQ}`;
  document.getElementById('btnNext').classList.remove('visible');
  answered = false;
}

function selectOption(idx) {
  if (answered) return;
  answered = true;
  const data = getQuestionData(currentQ);
  const shuffled = data.shuffled;
  const isCorrect = shuffled.options[idx].isCorrect;
  if (isCorrect) score++;

  answers.push({
    qId: data.question.id,
    moduleId: data.module.id,
    selectedIdx: idx,
    correct: isCorrect,
    selectedLetter: ['A','B','C','D'][idx]
  });

  const btns = document.querySelectorAll('.option-btn');
  btns.forEach((btn, i) => {
    btn.onclick = null;
    if (shuffled.options[i].isCorrect) btn.classList.add('correct');
    if (i === idx && !isCorrect) btn.classList.add('wrong');
    if (i === idx) btn.classList.add('selected');
  });

  document.getElementById('explanation').classList.add('visible');
  document.getElementById('btnNext').classList.add('visible');
  document.getElementById('btnNext').textContent = currentQ < totalQ - 1 ? '下一题 →' : '查看结果 🎯';
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= totalQ) {
    showResult();
  } else {
    renderQuestion(currentQ);
  }
}

function startQuiz() {
  currentQ = 0;
  score = 0;
  answers = [];
  answered = false;
  randomizeAnswers();
  document.getElementById('startPage').style.display = 'none';
  document.getElementById('quizPage').classList.add('active');
  document.getElementById('resultPage').classList.remove('active');
  renderQuestion(0);
}

function showResult() {
  document.getElementById('quizPage').classList.remove('active');
  document.getElementById('resultPage').classList.add('active');

  const pct = Math.round((score / totalQ) * 100);
  document.getElementById('resultScore').textContent = `${score}/${totalQ}`;
  const msgs = [
    { min: 90, text: '🎉 CRM优化大师！你对每个细节了如指掌！' },
    { min: 70, text: '👍 表现优秀！大部分知识点都掌握了！' },
    { min: 50, text: '💪 不错的基础，继续加油复习薄弱点！' },
    { min: 0, text: '📚 需要多复习哦，重新学习会议内容吧！' }
  ];
  document.getElementById('resultMsg').textContent = msgs.find(m => pct >= m.min).text;

  // Module scores
  const moduleScores = {};
  modules.forEach(m => { moduleScores[m.id] = { correct: 0, wrong: 0 }; });
  answers.forEach(a => {
    if (a.correct) moduleScores[a.moduleId].correct++;
    else moduleScores[a.moduleId].wrong++;
  });

  // Option preference
  const optionPreference = { A:0, B:0, C:0, D:0 };
  answers.forEach(a => { optionPreference[a.selectedLetter]++; });

  // Save to localStorage
  saveProgress({ score, moduleScores, details: answers, optionPreference });

  // Render memory panel
  const p = getProgress();
  const prevScore = p.history.length >= 2 ? p.history[p.history.length - 2].score : null;
  let trendHtml = '';
  if (prevScore !== null) {
    const diff = score - prevScore;
    if (diff > 0) trendHtml = `<span class="trend-value trend-up">↑ +${diff}</span>`;
    else if (diff < 0) trendHtml = `<span class="trend-value trend-down">↓ ${diff}</span>`;
    else trendHtml = `<span class="trend-value trend-flat">— 持平</span>`;
  } else {
    trendHtml = `<span class="trend-value trend-flat">首次答题</span>`;
  }

  const prefColors = ['#FF8FAB','#C4B5FD','#6EE7B7','#7DD3FC'];
  const totalPref = Object.values(optionPreference).reduce((a,b)=>a+b,0) || 1;
  const prefHtml = ['A','B','C','D'].map((l,i) => {
    const cnt = optionPreference[l];
    const p2 = Math.round((cnt/totalPref)*100);
    return `<div class="pref-bar-wrap">
      <span class="pref-label">${l}</span>
      <div class="pref-track"><div class="pref-fill" style="width:${p2}%;background:${prefColors[i]}"></div></div>
      <span class="pref-pct">${cnt}次 ${p2}%</span>
    </div>`;
  }).join('');

  const moduleMasteryHtml = modules.map(m => {
    const ms = moduleScores[m.id];
    const rate = ms.correct / (ms.correct + ms.wrong || 1);
    const pRate = Math.round(rate * 100);
    const color = rate >= 0.8 ? '#34D399' : rate >= 0.5 ? '#FDE68A' : '#FB7185';
    return `<div class="module-mastery-row">
      <span class="mm-icon">${m.icon}</span>
      <span class="mm-name">${m.title}</span>
      <div class="mm-bar"><div class="mm-fill" style="width:${pRate}%;background:${color}"></div></div>
      <span class="mm-pct" style="color:${color}">${pRate}%</span>
    </div>`;
  }).join('');

  document.getElementById('memoryPanel').innerHTML =
    `<h3>🧠 学习记忆面板</h3>` +
    `<div class="trend-row"><span class="trend-label">本次得分</span><span class="trend-value">${score}/${totalQ}</span></div>` +
    `<div class="trend-row"><span class="trend-label">历史最佳</span><span class="trend-value">${p.bestScore}/${totalQ}</span></div>` +
    `<div class="trend-row"><span class="trend-label">进步趋势</span>${trendHtml}</div>` +
    `<div style="margin:16px 0 8px;font-size:13px;font-weight:600;color:var(--text-secondary)">选项偏好</div>` +
    prefHtml +
    `<div style="margin:16px 0 8px;font-size:13px;font-weight:600;color:var(--text-secondary)">模块掌握度</div>` +
    moduleMasteryHtml;
}

function retryQuiz() {
  document.getElementById('resultPage').classList.remove('active');
  startQuiz();
}

// ========== INIT ==========
randomizeAnswers();
renderStartPage();
</script>
