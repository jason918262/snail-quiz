<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🐌 蜗牛AI · 互动学习测验</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg-cream:#FFF8F2;--bg-warm:#FFF5EB;--card-white:#FFFFFF;
  --text-primary:#2D2B32;--text-secondary:#6B6678;--text-muted:#9E99AA;
  --accent-pink:#FF8FAB;--accent-mint:#6EE7B7;--accent-sky:#7DD3FC;
  --accent-lavender:#C4B5FD;--accent-peach:#FCA5A5;--accent-yellow:#FDE68A;
  --green:#34D399;--red:#FB7185;--radius:24px;--radius-sm:16px;
  --font:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC",sans-serif;
}
body{font-family:var(--font);background:var(--bg-cream);color:var(--text-primary);min-height:100vh;overflow-x:hidden}

/* ===== 页面容器 ===== */
.app-container{max-width:680px;margin:0 auto;padding:20px 16px 100px;position:relative;z-index:1}

/* ===== 开始页 ===== */
.start-page{text-align:center;padding:60px 20px 40px}
.start-logo-wrap{margin-bottom:32px}
.start-logo-svg{width:160px;height:auto;border-radius:12px;object-fit:contain;animation:bounceIn 1s ease both;filter:drop-shadow(0 4px 20px rgba(212,175,55,0.4))}
@keyframes bounceIn{0%{transform:scale(.3);opacity:0}50%{transform:scale(1.05)}70%{transform:scale(.9)}100%{transform:scale(1);opacity:1}}
.start-title{font-size:28px;font-weight:800;background:linear-gradient(135deg,#D4AF37,#F5D76E);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.start-subtitle{font-size:15px;color:var(--text-secondary);margin-bottom:36px}
.start-btn{display:inline-block;padding:16px 48px;border-radius:50px;font-size:17px;font-weight:700;cursor:pointer;border:none;background:linear-gradient(135deg,var(--accent-pink),#f472b6);color:#fff;transition:.3s;box-shadow:0 4px 20px rgba(255,143,171,.35)}
.start-btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(255,143,171,.45)}
.start-progress{margin-top:40px;padding:24px;border-radius:var(--radius-sm);background:var(--card-white);box-shadow:0 2px 12px rgba(0,0,0,.04)}
.start-progress h3{font-size:14px;color:var(--text-muted);margin-bottom:14px}
.progress-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;text-align:left}
.progress-item{padding:10px 14px;border-radius:12px;background:var(--bg-warm);font-size:13px}
.progress-item .label{color:var(--text-muted);font-size:11px}
.progress-item .value{font-weight:700;font-size:18px;color:var(--text-primary)}
.weak-modules{margin-top:16px;display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
.weak-tag{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;background:#fef2f2;color:var(--red);border:1px solid #fecdd3}

/* ===== 题目区域 ===== */
.quiz-area{display:none}
.quiz-logo-bar{text-align:center;padding:12px 0 8px}
.quiz-logo-bar img{height:36px;width:auto;object-fit:contain;border-radius:8px;opacity:.45;transition:.3s}
.quiz-logo-bar img:hover{opacity:.7}
.quiz-logo-bar .logo-label{font-size:10px;color:var(--text-muted);letter-spacing:1px;margin-top:2px}

/* 进度条 */
.progress-bar-wrap{display:flex;align-items:center;gap:12px;margin-bottom:20px;padding:0 4px}
.progress-track{flex:1;height:8px;background:#ede9e3;border-radius:4px;overflow:hidden;position:relative}
.progress-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent-mint),var(--accent-sky));transition:width .5s ease}
.progress-text{font-size:12px;color:var(--text-muted);font-weight:600;white-space:nowrap;min-width:52px;text-align:right}
.progress-logo svg{width:20px;height:14px;opacity:.6}

/* 模块标签 */
.module-header{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.module-icon{font-size:22px}
.module-info h2{font-size:18px;font-weight:700}
.module-info p{font-size:12px;color:var(--text-muted)}

/* 题目卡片 */
.quiz-card{background:var(--card-white);border-radius:var(--radius);padding:28px 24px;box-shadow:0 4px 24px rgba(0,0,0,.05);position:relative;overflow:hidden;margin-bottom:24px;transition:.3z}
.quiz-card::before{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;border-radius:50%;opacity:.08;z-index:0}
.card-corner-snail{position:absolute;width:42px;height:42px;pointer-events:none;opacity:.45;z-index:0}
.corner-tl{top:8px;left:8px}.corner-tr{top:8px;right:8px}.corner-bl{bottom:8px;left:8px}.corner-br{bottom:8px;right:8px}

.q-number{font-size:11px;font-weight:700;color:var(--text-muted);letter-spacing:1px;margin-bottom:8px;position:relative;z-index:1}
.contact-tag{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;margin-bottom:14px;position:relative;z-index:1}
.contact-avatar{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:700}
.mastery-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:12px;font-size:10px;font-weight:700;margin-left:8px;position:relative;z-index:1}
.mastery-mastered{background:#ecfdf5;color:#059669;border:1px solid #a7f3d0}
.mastery-familiar{background:#fefce8;color:#a16207;border:1px solid #fde68a}
.mastery-weak{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
.mastery-new{background:#f5f3ff;color:#7c3aed;border:1px solid #ddd6fe}

.question-text{font-size:16px;line-height:1.65;font-weight:500;margin-bottom:20px;position:relative;z-index:1}

.options-list{display:flex;flex-direction:column;gap:10px;position:relative;z-index:1}
.option-btn{display:flex;align-items:center;gap:14px;padding:16px 18px;border-radius:var(--radius-sm);border:2px solid #f0ece4;background:#fafaf8;cursor:pointer;transition:.25s;font-size:15px;font-weight:500;text-align:left}
.option-btn:hover{border-color:var(--accent-pink);background:#fff;transform:translateX(4px)}
.option-letter{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;background:var(--bg-warm);color:var(--text-secondary);flex-shrink:0;transition:.25s}
.option-btn.selected{border-color:var(--accent-lavender);background:#faf5ff}
.option-btn.selected .option-letter{background:var(--accent-lavender);color:#fff}
.option-btn.correct{border-color:var(--green)!important;background:#ecfdf5!important}
.option-btn.correct .option-letter{background:var(--green)!important;color:#fff!important}
.option-btn.wrong{border-color:var(--red)!important;background:#fef2f2!important}
.option-btn.wrong .option-letter{background:var(--red)!important;color:#fff!important}
.option-btn.disabled{pointer-events:none;opacity:.6}

.explanation-area{display:none;margin-top:20px;padding:18px;border-radius:var(--radius-sm);background:var(--bg-warm);position:relative;z-index:1}
.explanation-area.show{display:block;animation:fadeUp .4s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.explanation-title{font-size:13px;font-weight:700;color:var(--text-secondary);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.explanation-text{font-size:14px;line-height:1.7;color:var(--text-primary)}
.knowledge-tag{display:inline-block;padding:2px 10px;border-radius:10px;font-size:11px;background:#e0e7ff;color:#4338ca;margin-top:10px}

.nav-buttons{display:flex;gap:12px;margin-top:20px}
.nav-btn{flex:1;padding:14px;border-radius:var(--radius-sm);font-size:15px;font-weight:700;cursor:pointer;border:none;transition:.25s}
.nav-btn.primary{background:linear-gradient(135deg,var(--accent-pink),#f472b6);color:#fff;box-shadow:0 4px 16px rgba(255,143,171,.3)}
.nav-btn.primary:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(255,143,171,.4)}
.nav-btn.secondary{background:var(--bg-warm);color:var(--text-secondary);border:1.5px solid #e8e2da}
.nav-btn.secondary:hover{border-color:var(--accent-lavender)}

/* ===== 结果页 ===== */
.result-page{display:none;text-align:center;padding:40px 20px}
.result-logo-svg{width:100px;height:auto;margin-bottom:20px;border-radius:12px;object-fit:contain;animation:bounceIn .8s ease both;filter:drop-shadow(0 4px 16px rgba(212,175,55,.35))}
.result-score-circle{width:160px;height:160px;border-radius:50%;margin:0 auto 24px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}
.score-ring{position:absolute;width:100%;height:100%;border-radius:50%;border:6px solid #ede9e3}
.score-fill{position:absolute;width:100%;height:100%;border-radius:50%;border:6px solid transparent;border-top-color:var(--accent-mint);border-right-color:var(--accent-mint);transition:transform .8s ease}
.score-number{font-size:44px;font-weight:800;background:linear-gradient(135deg,#059669,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.score-label{font-size:12px;color:var(--text-muted);margin-top:2px}
.result-title{font-size:24px;font-weight:800;margin-bottom:6px}
.result-subtitle{font-size:14px;color:var(--text-secondary);margin-bottom:32px}

.memory-panel{background:var(--card-white);border-radius:var(--radius);padding:24px;box-shadow:0 4px 24px rgba(0,0,0,.05);text-align:left;margin-bottom:24px}
.memory-panel h3{font-size:15px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.memory-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f5f0ea}
.memory-row:last-child{border:none}
.memory-label{font-size:13px;color:var(--text-secondary)}
.memory-value{font-size:15px;font-weight:700}
.trend-up{color:var(--green)}.trend-down{color:var(--red)}.trend-same{color:var(--text-muted)}

.preference-section{margin-top:16px}
.pref-label{width:20px;font-size:12px;font-weight:700;color:var(--text-muted)}
.pref-bar{flex:1;height:18px;background:#f0ece4;border-radius:4px;overflow:hidden;position:relative}
.pref-fill{height:100%;border-radius:4px;transition:width .5s ease}
.pref-pct{font-size:11px;font-weight:600;color:var(--text-muted);min-width:32px;text-align:right}

.module-mastery{margin-top:16px}
.mm-item{display:flex;align-items:center;gap:10px;padding:8px 0}
.mm-icon{font-size:16px}
.mm-name{flex:1;font-size:13px;font-weight:500}
.mm-bar{width:80px;height:8px;background:#f0ece4;border-radius:4px;overflow:hidden}
.mm-fill{height:100%;border-radius:4px}
.mm-pct{font-size:11px;font-weight:700;color:var(--text-muted);min-width:32px;text-align:right}

.result-actions{display:flex;gap:12px;margin-top:28px}
.result-actions .nav-btn{padding:16px 28px}

/* ===== 15种题目背景色 ===== */
.snail-bg-1{background:linear-gradient(135deg,#FFF0F5,#FFE4EC)}.snail-bg-2{background:linear-gradient(135deg,#F0FFF4,#E6FFE6)}
.snail-bg-3{background:linear-gradient(135deg,#F0F8FF,#E6F2FF)}.snail-bg-4{background:linear-gradient(135deg,#F8F0FF,#F0E6FF)}
.snail-bg-5{background:linear-gradient(135deg,#FFF5F0,#FFEEE6)}.snail-bg-6{background:linear-gradient(135deg,#FFFCF0,#FFF8E6)}
.snail-bg-7{background:linear-gradient(135deg,#FFF0F0,#FFE8E8)}.snail-bg-8{background:linear-gradient(135deg,#F0FFF5,#E6FFEE)}
.snail-bg-9{background:linear-gradient(135deg,#F8F0FF,#F3E8FF)}.snail-bg-10{background:linear-gradient(135deg,#FFF0F5,#FFE8F0)}
.snail-bg-11{background:linear-gradient(135deg,#F0FFFF,#E6FAFA)}.snail-bg-12{background:linear-gradient(135deg,#FFFDF5,#FFF8EE)}
.snail-bg-13{background:linear-gradient(135deg,#FFF0F3,#FFEAEF)}.snail-bg-14{background:linear-gradient(135deg,#FFFCF0,#FFF5E6)}
.snail-bg-15{background:linear-gradient(135deg,#F8F0FF,#F5EAFF)}

/* ===== 浮动蜗牛 ===== */
.snail-float{position:fixed;z-index:50;opacity:.5;pointer-events:none;animation:snailFloat 4s ease-in-out infinite}
.sf-1{top:80px;left:12px;animation-delay:0s}.sf-2{top:200px;right:16px;animation-delay:.8s}
.sf-3{top:400px;left:8px;animation-delay:1.6s}.sf-4{top:560px;right:12px;animation-delay:2.4s}
.sf-5{top:720px;left:20px;animation-delay:3.2s}.sf-6{top:900px;right:8px;animation-delay:.4s}
.sf-7{top:1080px;left:14px;animation-delay:1.2s}.sf-8{top:1240px;right:20px;animation-delay:2s}
@keyframes snailFloat{0%,100%{transform:translateY(0) rotate(0deg)}25%{transform:translateY(-8px) rotate(2deg)}75%{transform:translateY(5px) rotate(-2deg)}}

@media(max-width:520px){
  .app-container{padding:12px 10px 80px}
  .start-title{font-size:24px}.quiz-card{padding:22px 18px}
  .question-text{font-size:15px}.option-btn{padding:14px 14px;font-size:14px}
  .quiz-logo-bar svg{height:24px}
  .start-logo-svg{width:120px}
  .result-score-circle{width:130px;height:130px}
  .score-number{font-size:36px}
  .memory-panel{padding:18px}
  .snail-float{display:none}
}
</style>
</head>

// ==================== 全局状态 ====================
var currentQ = 0;
var score = 0;
var answers = [];
var userOptions = {};
var optionLetters = ['A','B','C','D'];
var STORAGE_KEY = 'snail_quiz_progress';

// ==================== localStorage 进度管理 ====================
function loadProgress(){ try{ return JSON.parse(localStorage.getItem(STORAGE_KEY))||null; }catch(e){return null;} }
function saveProgress(data){ try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }catch(e){} }

function getModuleStats(){ var p=loadProgress(); return p?(p.moduleStats||{}):{}; }
function getQuestionStats(){ var p=loadProgress(); return p?(p.questionStats||{}):{}; }

function getMasteryLevel(mId){
  var stats=getModuleStats(); var m=stats[mId];
  if(!m) return 'new';
  var total=(m.totalCorrect||0)+(m.totalWrong||0);
  if(total===0) return 'new';
  var rate=m.totalCorrect/total;
  if(rate>=0.8) return 'mastered'; if(rate>=0.5) return 'familiar'; return 'weak';
}
function getMasteryLabel(lv){
  return {mastered:'✅ 已 mastered',familiar:'👍 熟悉中',weak:'⚠️ 薄弱',new:'🆕 首次'}[lv]||'🆕 首次';
}
function getMasteryClass(lv){ return 'mastery-'+lv; }

function showHistoryPanel(){
  var p=loadProgress();
  var panel=document.getElementById('historyPanel'); var grid=document.getElementById('progressGrid'); var weakDiv=document.getElementById('weakModules');
  if(!p||!p.totalAttempts){ panel.style.display='none'; return; }
  panel.style.display='block';
  var avg=p.totalAttempts>0?((p.history||[]).reduce(function(s,h){return s+h.score;},0)/(p.history||[]).length).toFixed(1):'0';
  grid.innerHTML='<div class="progress-item"><div class="label">答题次数</div><div class="value">'+p.totalAttempts+'次</div></div>'+
    '<div class="progress-item"><div class="label">历史最佳</div><div class="value">'+(p.bestScore||0)+'分</div></div>'+
    '<div class="progress-item"><div class="label">平均得分</div><div class="value">'+avg+'分</div></div>'+
    '<div class="progress-item"><div class="label">上次成绩</div><div class="value">'+(p.lastScore||0)+'分</div></div>'+
    '<div class="progress-item"><div class="label">上次日期</div><div class="value">'+(p.lastScore!=null?(p.lastDate||'-'):'-')+'</div></div>';
  weakDiv.innerHTML='';
  var ms=p.moduleStats||{};
  Object.keys(ms).forEach(function(mid){
    var m=ms[mid]; var total=(m.totalCorrect||0)+(m.totalWrong||0);
    if(total>=3&&m.totalCorrect/total<0.5){
      var mod=quizData.modules.find(function(x){return x.id==parseInt(mid);});
      if(mod){ var tag=document.createElement('span');tag.className='weak-tag';tag.textContent=mod.title;weakDiv.appendChild(tag); }
    }
  });
  if(weakDiv.children.length===0) weakDiv.innerHTML='<span style="font-size:12px;color:#6EE7B7">暂无薄弱模块，继续保持！🎉</span>';
}

// ==================== 答案随机化算法 ====================
function randomizeAnswers(question){
  var correctSlot=Math.floor(Math.random()*4);
  var wrongs=[].concat(question.options);
  var correctAns=wrongs.splice(question.originalAnswer,1)[0];
  for(var i=wrongs.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var tmp=wrongs[i];wrongs[i]=wrongs[j];wrongs[j]=tmp; }
  var arr=[].concat(wrongs);
  arr.splice(correctSlot,0,correctAns);
  return {options:arr,correctIndex:correctSlot};
}

// ==================== 渲染题目 ====================
function renderQuestion(idx){
  var qFlat=[];
  quizData.modules.forEach(function(mod){mod.questions.forEach(function(q){qFlat.push({q:q,icon:mod.icon,title:mod.title,subtitle:mod.subtitle,color:mod.color,id:mod.id});});});
  if(idx>=qFlat.length) return showResult();
  var item=qFlat[idx]; var q=item.q;

  var randomized=randomizeAnswers(q);
  var masteryLv=getMasteryLevel(item.id);

  var container=document.getElementById('questionContainer');
  container.innerHTML=
    '<div class="module-header">'+
      '<span class="module-icon">'+item.icon+'</span>'+
      '<div class="module-info"><h2>'+item.title+'</h2><p>'+item.subtitle+'</p></div>'+
    '</div>'+
    '<div class="quiz-card snail-bg-'+q.id+'">'+
      '<div class="card-corner-snail corner-tl"><svg width="42" height="42" viewBox="0 0 36 28"><ellipse cx="18" cy="18" rx="14" ry="10" fill="'+q.contact.color+'" opacity=".3"/><circle cx="18" cy="16" r="7" fill="'+q.contact.color+'" opacity=".2"/></svg></div>'+
      '<div class="card-corner-snail corner-br"><svg width="42" height="42" viewBox="0 0 36 28"><ellipse cx="18" cy="18" rx="14" ry="10" fill="'+q.contact.color+'" opacity=".25"/></svg></div>'+
      '<div class="q-number">QUESTION '+q.id+'/15</div>'+
      '<div class="contact-tag" style="background:'+q.contact.color+'15;color:'+q.contact.color+';border:1px solid '+q.contact.color+'40">'+
        '<div class="contact-avatar" style="background:'+q.contact.color+'">'+q.contact.initial+'</div>'+
        q.contact.name+' · '+q.contact.role+
        '<span class="mastery-badge '+getMasteryClass(masteryLv)+'">'+getMasteryLabel(masteryLv)+'</span>'+
      '</div>'+
      '<div class="question-text">'+q.text+'</div>'+
      '<div class="options-list" id="optionsList">'+
        randomized.options.map(function(opt,i){
          return '<button class="option-btn" data-index="'+i+'" onclick="selectOption('+q.id+','+i+','+randomized.correctIndex+',\''+q.contact.color+'\')">'+
            '<span class="option-letter">'+optionLetters[i]+'</span><span>'+opt+'</span>'+
          '</button>';
        }).join('')+
      '</div>'+
      '<div class="explanation-area" id="expl'+q.id+'">'+
        '<div class="explanation-title">💡 解析</div>'+
        '<div class="explanation-text">'+q.explanation+'</div>'+
        '<span class="knowledge-tag"># '+q.knowledge+'</span>'+
      '</div>'+
      '<div class="nav-buttons" id="nav'+q.id+'" style="display:none">'+
        (idx<qFlat.length-1?'<button class="nav-btn primary" onclick="nextQuestion()">下一题 →</button>':'<button class="nav-btn primary" onclick="showResult()">查看结果 🏆</button>')+
      '</div>'+
    '</div>';

  document.getElementById('progressFill').style.width=((idx)/qFlat.length)*100+'%';
  document.getElementById('progressText').textContent=(idx+1)+'/'+qFlat.length;
}

// ==================== 选择答案 ====================
function selectOption(qId,selectedIndex,correctIndex,contactColor){
  var btns=document.querySelectorAll('#optionsList .option-btn');
  btns.forEach(function(b){b.classList.add('disabled');});

  btns[selectedIndex].classList.add('selected');
  var isCorrect=selectedIndex===correctIndex;

  var letter=optionLetters[selectedIndex]; userOptions[letter]=(userOptions[letter]||0)+1;

  if(isCorrect){ score++; btns[selectedIndex].classList.add('correct'); }
  else{ btns[selectedIndex].classList.add('wrong'); btns[correctIndex].classList.add('correct'); }

  document.getElementById('expl'+qId).classList.add('show');
  document.getElementById('nav'+qId).style.display='flex';

  answers.push({qId:qId,selected:selectedIndex,correct:correctIndex,isCorrect:isCorrect});
}

function nextQuestion(){ currentQ++; renderQuestion(currentQ); }

// ==================== 开始 & 重试 ====================
function startQuiz(){
  score=0; currentQ=0; answers=[]; userOptions={};
  document.getElementById('startPage').style.display='none';
  document.getElementById('quizArea').style.display='block';
  document.getElementById('resultPage').style.display='none';
  renderQuestion(currentQ);
}
function retryQuiz(){ startQuiz(); }

// ==================== 结果页 ====================
function showResult(){
  document.getElementById('quizArea').style.display='none';
  document.getElementById('resultPage').style.display='block';

  var scoreEl=document.getElementById('scoreNumber');
  var display=0; var target=score;
  var anim=setInterval(function(){ display++; scoreEl.textContent=display; if(display>=target)clearInterval(anim); },80);

  document.getElementById('scoreFill').style.transform='rotate('+((score/15)*360)+'deg)';

  var titles=['💪 继续加油！','👍 还不错！','🎉 很棒！','🏆 太厉害了！','👑 完美通关！'];
  var subs=['多复习几次就能进步哦～','已经超过一半了，保持节奏！','你对AI的理解很扎实了！','你是蜗牛AI的超级学员！','满分大神！请收下我们的膝盖！'];
  var tier=score<=4?0:score<=7?1:score<=11?2:score<15?3:4;
  document.getElementById('resultTitle').textContent=titles[tier];
  document.getElementById('resultSubtitle').textContent=subs[tier];

  saveToStorage();
  renderMemoryPanel();
}

function saveToStorage(){
  var p=loadProgress()||{totalAttempts:0,bestScore:0,lastScore:0,lastDate:'',history:[],questionStats:{},moduleStats:{},optionPreference:{A:0,B:0,C:0,D:0}};
  p.totalAttempts=(p.totalAttempts||0)+1; p.lastScore=score; p.lastDate=new Date().toISOString().slice(0,10);
  if(score>(p.bestScore||0)) p.bestScore=score;

  var moduleScores={};
  quizData.modules.forEach(function(mod){
    var modAns=answers.filter(function(a){ return mod.questions.some(function(q){return q.id===a.qId;}); });
    moduleScores[mod.id]={correct:modAns.filter(function(a){return a.isCorrect;}).length,total:modAns.length};
  });
  (p.history=p.history||[]).unshift({date:p.lastDate,score:score,total:15,moduleScores:moduleScores});
  if(p.history.length>20) p.history.pop();

  answers.forEach(function(a){
    var qs=(p.questionStats=p.questionStats||{})[a.qId]||(p.questionStats[a.qId]={correct:0,wrong:0,lastAnswer:a.selected});
    if(a.isCorrect) qs.correct++; else qs.wrong++;
    qs.lastAnswer=a.selected;
  });

  quizData.modules.forEach(function(mod){
    var ms=(p.moduleStats=p.moduleStats||{})[mod.id]||(p.moduleStats[mod.id]={totalCorrect:0,totalWrong:0});
    mod.questions.forEach(function(q){
      var ans=answers.find(function(a){return a.qId===q.id;});
      if(ans){ if(ans.isCorrect) ms.totalCorrect++; else ms.totalWrong++; }
    });
  });

  Object.keys(userOptions).forEach(function(k){ p.optionPreference[k]=(p.optionPreference[k]||0)+userOptions[k]; });
  saveProgress(p);
}

function renderMemoryPanel(){
  var p=loadProgress(); if(!p)return;
  var content=document.getElementById('memoryContent');

  var prevScore=p.history&&p.history.length>1?p.history[1].score:null; var trendHtml='';
  if(prevScore!=null){ var diff=score-prevScore; var cls=diff>0?'trend-up':diff<0?'trend-down':'trend-same'; var arrow=diff>0?'↑':diff<0?'↓':'—'; trendHtml='<span class="'+cls+'">'+arrow+Math.abs(diff)+'</span>'; }

  var op=p.optionPreference||{A:0,B:0,C:0,D:0}; var opTotal=op.A+op.B+op.C+op.D||1;
  var prefColors={A:'#FF8FAB',B:'#6EE7B7',C:'#7DD3FC',D:'#C4B5FD'};
  var prefHtml=Object.keys(op).map(function(k){
    return '<div style="display:flex;align-items:center;gap:8px;margin-top:6px"><span class="pref-label" style="color:'+prefColors[k]+'">'+k+'</span><div class="pref-bar"><div class="pref-fill" style="width:'+((op[k]/opTotal)*100)+'%;background:'+prefColors[k]+'"></div></div><span class="pref-pct">'+op[k]+'次 ('+Math.round((op[k]/opTotal)*100)+'%)</span></div>';
  }).join('');

  var ms=p.moduleStats||{};
  var modMasteryHtml=quizData.modules.map(function(mod){
    var m=ms[mod.id]||{totalCorrect:0,totalWrong:0}; var total=m.totalCorrect+m.totalWrong; var rate=total>0?(m.totalCorrect/total)*100:0;
    var fillColor=rate>=80?'#34D399':rate>=50?'#FDE68A':'#FB7185';
    return '<div class="mm-item"><span class="mm-icon">'+mod.icon+'</span><span class="mm-name">'+mod.title+'</span><div class="mm-bar"><div class="mm-fill" style="width:'+rate+'%;background:'+fillColor+'"></div></div><span class="mm-pct">'+(total>0?Math.round(rate)+'%':'—')+'</span></div>';
  }).join('');

  content.innerHTML=
    '<div class="memory-row"><span class="memory-label">本次得分</span><span class="memory-value" style="color:#059669;font-size:22px">'+score+'<small style="font-size:12px;color:#9E99AA">/15</small> '+trendHtml+'</span></div>'+
    '<div class="memory-row"><span class="memory-label">历史最佳</span><span class="memory-value">'+(p.bestScore||0)+'<small style="font-size:12px;color:#9E99AA">/15</small></span></div>'+
    '<div class="memory-row"><span class="memory-label">累计答题</span><span class="memory-value">'+p.totalAttempts+'次</span></div>'+
    '<div class="preference-section" style="margin-top:20px;padding-top:14px;border-top:1px solid #f0ece4"><div style="font-size:13px;font-weight:700;color:var(--text-secondary);margin-bottom:4px">📊 选项偏好统计</div>'+prefHtml+'</div>'+
    '<div class="module-mastery" style="margin-top:18px;padding-top:14px;border-top:1px solid #f0ece4"><div style="font-size:13px;font-weight:700;color:var(--text-secondary);margin-bottom:4px">📈 模块掌握度</div>'+modMasteryHtml+'</div>';
}

// ==================== 按钮事件绑定 & 初始化 ====================
document.addEventListener('DOMContentLoaded', function(){
  // 绑定开始按钮点击事件
  var startBtn = document.getElementById('startBtn');
  if(startBtn){
    startBtn.addEventListener('click', function(e){
      e.preventDefault();
      startQuiz();
    });
  }

  // 显示历史进度
  showHistoryPanel();
});
</script>
</body>
